# CrossQ Classic Control — SAC without target networks + Batch Renormalization in critics
# Plain [256,256] actor, [256,256]+BRN critics, lr=3e-4

_actor: &actor
  modules:
    body:
      Sequential:
        - LazyLinear:
            out_features: 256
        - ReLU:
        - LazyLinear:
            out_features: 256
        - ReLU:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_critic_brn: &critic_brn
  modules:
    body:
      Sequential:
        - LazyLinear:
            out_features: 256
        - LazyBatchRenorm1d:
            momentum: 0.01
            eps: 0.001
            warmup_steps: 5000
        - ReLU:
        - LazyLinear:
            out_features: 256
        - LazyBatchRenorm1d:
            momentum: 0.01
            eps: 0.001
            warmup_steps: 5000
        - ReLU:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_net: &net
  type: TorchArcNet
  arc: *actor
  hid_layers_activation: relu
  clip_grad_val: null
  loss_spec:
    name: MSELoss
  optim_spec:
    name: Adam
    lr: 3.0e-4
  gpu: auto

_critic_net: &critic_net
  type: TorchArcNet
  arc: *critic_brn
  hid_layers_activation: relu
  clip_grad_val: null
  loss_spec:
    name: MSELoss
  optim_spec:
    name: Adam
    lr: 3.0e-4
  gpu: auto

_memory: &memory
  name: Replay
  batch_size: 256
  max_size: 100000
  use_cer: false

_meta: &meta
  distributed: false
  log_frequency: 500
  eval_frequency: 500
  max_session: 4
  max_trial: 1

crossq_cartpole:
  agent:
    name: CrossQ
    algorithm:
      name: CrossQ
      action_pdtype: Categorical
      action_policy: default
      gamma: 0.99
      training_frequency: 1
      training_iter: 2
      training_start_step: 1000
      policy_delay: 3
      log_alpha_max: 2.0
    memory: *memory
    net: *net
    critic_net: *critic_net
  env:
    name: CartPole-v1
    num_envs: 4
    max_t: null
    max_frame: 200000
  meta: *meta

crossq_acrobot:
  agent:
    name: CrossQ
    algorithm:
      name: CrossQ
      action_pdtype: Categorical
      action_policy: default
      gamma: 0.99
      training_frequency: 1
      training_start_step: 1000
      policy_delay: 3
      log_alpha_max: 2.0
    memory: *memory
    net: *net
    critic_net: *critic_net
  env:
    name: Acrobot-v1
    num_envs: 4
    max_t: null
    max_frame: 300000
  meta: *meta

crossq_pendulum:
  agent:
    name: CrossQ
    algorithm:
      name: CrossQ
      action_pdtype: Normal
      action_policy: default
      gamma: 0.99
      training_iter: 4
      training_frequency: 1
      training_start_step: 256
      policy_delay: 3
      log_alpha_max: 0.5
    memory: *memory
    net: *net
    critic_net: *critic_net
  env:
    name: Pendulum-v1
    num_envs: 4
    max_t: null
    max_frame: 300000
  meta:
    <<: *meta
    eval_frequency: 5000
