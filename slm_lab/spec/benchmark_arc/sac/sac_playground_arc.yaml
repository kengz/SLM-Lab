# SAC Playground specs — MJX GPU-accelerated environments
#
# UTD formula:
#   training_frequency=1:  UTD = training_iter / num_envs
#   training_frequency>1:  UTD = training_iter / training_frequency
#   (training fires every ceil(training_frequency/num_envs) env steps)
#
# Usage: -s env=playground/CheetahRun -s max_frame=2000000
#
# Variant         num_envs  freq    iter  batch   UTD     fps     Notes
# fast            64        1       4     1024    0.0625  ~350    default — most envs
# hard            16        1       16    512     1.0     ~58     hard envs needing high UTD

# --- Shared anchors ---

_arc_body_256: &arc_body_256
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - ReLU:
        - LazyLinear: {out_features: 256}
        - ReLU:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_sac_net: &sac_net
  type: TorchArcNet
  arc: *arc_body_256
  hid_layers_activation: relu
  init_fn: orthogonal_
  clip_grad_val: null
  loss_spec:
    name: MSELoss
  optim_spec:
    name: Adam
    lr: 3.0e-4
  update_type: polyak
  update_frequency: 1
  polyak_coef: 0.005
  gpu: auto

_sac_algorithm: &sac_algorithm
  name: SoftActorCritic
  action_pdtype: default
  action_policy: default
  gamma: 0.99
  training_frequency: 1
  training_iter: 4
  training_start_step: 5000

_meta: &meta
  distributed: false
  log_frequency: 10000
  eval_frequency: 10000
  rigorous_eval: 0
  max_session: 4
  max_trial: 1

# --- fast: 64 envs, UTD=0.0625 — default for most playground envs (~350fps) ---

sac_playground_arc_fast:
  agent:
    name: SoftActorCritic
    algorithm: *sac_algorithm
    memory:
      name: Replay
      batch_size: 1024
      max_size: 1000000
      use_cer: false
    net: *sac_net
  env:
    name: "${env}"
    num_envs: 64
    max_t: null
    max_frame: "${max_frame}"
    normalize_obs: true
  meta: *meta

# --- hard: 16 envs, UTD=1.0 — hard envs needing high UTD (~58fps actual, 2M in ~9.5h > 4h budget) ---
# Use max_frame=1000000 to stay within dstack 6h limit (~1.25M frames collected).
# Use for: HopperHop, Humanoid*, CartpoleSwingup*, PendulumSwingup, BallInCup, Swimmer

sac_playground_arc_hard:
  agent:
    name: SoftActorCritic
    algorithm:
      <<: *sac_algorithm
      training_iter: 16
      training_start_step: 10000
    memory:
      name: Replay
      batch_size: 512
      max_size: 1000000
      use_cer: false
    net: *sac_net
  env:
    name: "${env}"
    num_envs: 16
    max_t: null
    max_frame: "${max_frame}"
    normalize_obs: true
  meta: *meta
