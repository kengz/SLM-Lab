# PPO Playground using TorchArcNet
# Single unified spec with ${env} and ${max_frame} substitution
# Usage: uv run slm-lab slm_lab/spec/benchmark_arc/ppo/ppo_playground_arc.yaml ppo_playground_arc train -s env=playground/CartpoleBalance -s max_frame=2000000
#
# num_envs=64 for all envs (DM Control, Loco, Manip) — 4× FPS vs 16 envs

# --- Shared anchors ---

_arc_body_64: &arc_body_64
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 64}
        - Tanh:
        - LazyLinear: {out_features: 64}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_ppo_net: &ppo_net
  type: TorchArcNet
  shared: false
  arc: *arc_body_64
  hid_layers_activation: tanh
  init_fn: orthogonal_
  clip_grad_val: 0.5
  use_same_optim: true
  loss_spec:
    name: MSELoss
  optim_spec:
    name: Adam
    lr: 3.0e-4
  gpu: auto

_ppo_algorithm: &ppo_algorithm
  name: PPO
  action_pdtype: default
  action_policy: default
  explore_var_spec: null
  gamma: 0.99
  lam: 0.95
  clip_eps_spec:
    name: no_decay
    start_val: 0.2
    end_val: 0.2
    start_step: 0
    end_step: 0
  entropy_coef_spec:
    name: no_decay
    start_val: 0.01
    end_val: 0.01
    start_step: 0
    end_step: 0
  val_loss_coef: 0.5
  time_horizon: 2048
  minibatch_size: 64
  training_epoch: 10
  normalize_v_targets: true

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 5000
  eval_frequency: 5000
  max_session: 4
  max_trial: 1

# --- Unified: 64 envs, normalize_obs=true, entropy=0.01 ---

ppo_playground_arc:
  agent:
    name: PPO
    algorithm: *ppo_algorithm
    memory: *memory
    net: *ppo_net
  env:
    name: "${env}"
    num_envs: 64
    max_t: null
    max_frame: "${max_frame}"
    normalize_obs: true
  meta: *meta
