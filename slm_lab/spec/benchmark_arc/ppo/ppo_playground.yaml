# PPO MuJoCo Playground — MJWarp GPU (matching official Brax PPO hyperparameters)
#
# Variants:
#   ppo_playground            — DM Control default (gamma=0.995, 16 epochs, 2048 envs)
#   ppo_playground_fingerspin — FingerSpin: gamma=0.95 (official dm_control_suite_params.py)
#   ppo_playground_pendulum   — PendulumSwingup: 4 epochs (official); action_repeat=4 set in playground.py
#   ppo_playground_loco       — Locomotion/Manipulation (gamma=0.97, 4 epochs, 2048 envs)
#
# Architecture: asymmetric policy=[64,64]+SiLU, value=[256,256,256,256,256]+SiLU
#   Per official mujoco_playground (policy=[32,32,32,32]+Swish, value=[256,256,256,256,256]+Swish)
#   Smaller policy = lower sample complexity + cleaner gradient signal
#
# Usage:
#   slm-lab ... ppo_playground train -s env=playground/CartpoleBalance -s max_frame=100000000
#   slm-lab ... ppo_playground_loco train -s env=playground/Go1Getup -s max_frame=100000000
#
# Batch math:
#   DM Control: 2048 envs x 480 steps = 983K, 32 minibatches, 16 epochs = 512 grad steps
#   Loco/Manip: 2048 envs x 64 steps = 131K, 32 minibatches,  4 epochs = 128 grad steps
#
# Brax-matching rationale: official mujoco_playground uses unroll_length=30 with 16 unrolls
#   per training step → effective time_horizon=480. clip_eps=0.3, no grad clipping, constant LR
#   for DM Control. Loco uses different params (grad clipping on, etc.).

# --- Shared ---

_policy_body: &policy_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 64}
        - SiLU:
        - LazyLinear: {out_features: 64}
        - SiLU:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_value_body: &value_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - SiLU:
        - LazyLinear: {out_features: 256}
        - SiLU:
        - LazyLinear: {out_features: 256}
        - SiLU:
        - LazyLinear: {out_features: 256}
        - SiLU:
        - LazyLinear: {out_features: 256}
        - SiLU:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 100000
  eval_frequency: 100000
  max_session: 4
  max_trial: 1

_env: &env
  name: "${env}"
  max_t: null
  max_frame: "${max_frame}"
  normalize_obs: true
  reward_scale: 10.0

_algorithm: &algorithm
  name: PPO
  gamma: 0.99
  lam: 0.95
  clip_eps_spec:
    name: no_decay
    start_val: 0.3
  entropy_coef_spec:
    name: no_decay
    start_val: 0.01
  val_loss_coef: 0.5
  minibatch_size: 4096
  normalize_v_targets: true

_net: &net
  type: TorchArcNet
  actor_arc: *policy_body
  critic_arc: *value_body
  shared: false
  hid_layers_activation: relu
  init_fn: orthogonal_
  clip_grad_val: null
  use_same_optim: false
  loss_spec:
    name: MSELoss
  optim_spec:
    name: Adam
    lr: 1.0e-3
    eps: 1.0e-5
  lr_scheduler_spec:
    name: LinearToMin
    frame: "${max_frame}"
    min_factor: 1.0
  gpu: auto

# --- DM Control: gamma=0.995, 16 epochs, 2048 envs ---

ppo_playground:
  agent:
    name: PPO
    algorithm:
      <<: *algorithm
      gamma: 0.995
      time_horizon: 480
      training_epoch: 16
      minibatch_size: 30720  # 2048 envs x 480 steps / 32 minibatches = 30720
    memory: *memory
    net: *net
  env:
    <<: *env
    num_envs: 2048
  meta: *meta

# --- FingerSpin: gamma=0.95 (official dm_control_suite_params.py override) ---

ppo_playground_fingerspin:
  agent:
    name: PPO
    algorithm:
      <<: *algorithm
      gamma: 0.95
      time_horizon: 480
      training_epoch: 16
      minibatch_size: 30720
    memory: *memory
    net: *net
  env:
    <<: *env
    num_envs: 2048
  meta: *meta

# --- PendulumSwingup: training_epoch=4 (official); action_repeat=4 handled in playground.py ---

ppo_playground_pendulum:
  agent:
    name: PPO
    algorithm:
      <<: *algorithm
      gamma: 0.995
      time_horizon: 480
      training_epoch: 4
      minibatch_size: 30720
    memory: *memory
    net: *net
  env:
    <<: *env
    num_envs: 2048
  meta: *meta

# --- Locomotion/Manipulation: gamma=0.97, 4 epochs, 2048 envs ---

ppo_playground_loco:
  agent:
    name: PPO
    algorithm:
      <<: *algorithm
      gamma: 0.97
      time_horizon: 64
      training_epoch: 4
    memory: *memory
    net:
      <<: *net
      clip_grad_val: 1.0
  env:
    <<: *env
    num_envs: 2048
  meta: *meta
