# PPO MuJoCo Playground — MJWarp GPU
#
# Variants:
#   ppo_playground      — DM Control (gamma=0.995, lr=1e-3, 16 epochs, 2048 envs)
#   ppo_playground_loco — Locomotion/Manipulation (gamma=0.97, lr=1e-3, 4 epochs, 2048 envs)
#
# Architecture: asymmetric policy=[64,64]+SiLU, value=[256,256,256]+SiLU
#   Per official mujoco_playground (policy=[32,32,32,32]+Swish, value=[256,256,256,256,256]+Swish)
#   Smaller policy = lower sample complexity + cleaner gradient signal
#
# Usage:
#   slm-lab ... ppo_playground train -s env=playground/CartpoleBalance -s max_frame=100000000
#   slm-lab ... ppo_playground_loco train -s env=playground/Go1Getup -s max_frame=100000000
#
# Batch math:
#   DM Control: 2048 envs x 30 steps = 61K, 30 minibatches, 16 epochs = 480 grad steps
#   Loco/Manip: 2048 envs x 64 steps = 131K, 32 minibatches,  4 epochs = 128 grad steps
#
# time_horizon rationale: official mujoco_playground uses unroll_length=30 (DM Control)
#   time_horizon=128 (p5-ppo5) was 4x too long → 4x slower convergence observed empirically
#
# minibatch_size rationale: official uses num_minibatches=32 (minibatch_size=1920)
#   SLM-Lab venv_pack constraint: minibatch_size must be >= num_envs (2048)
#   DM Control: 61K / 2048 = 30 minibatches (vs 15 before → 2x more grad steps)
#   Loco: 131K / 4096 = 32 minibatches (already matches official)

# --- Shared ---

_policy_body: &policy_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 64}
        - SiLU:
        - LazyLinear: {out_features: 64}
        - SiLU:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_value_body: &value_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - SiLU:
        - LazyLinear: {out_features: 256}
        - SiLU:
        - LazyLinear: {out_features: 256}
        - SiLU:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 1000000
  eval_frequency: 100000
  max_session: 4
  max_trial: 1

_env: &env
  name: "${env}"
  max_t: null
  max_frame: "${max_frame}"
  normalize_obs: true

_algorithm: &algorithm
  name: PPO
  gamma: 0.99
  lam: 0.95
  clip_eps_spec:
    name: no_decay
    start_val: 0.2
  entropy_coef_spec:
    name: no_decay
    start_val: 0.01
  val_loss_coef: 0.5
  minibatch_size: 4096
  normalize_v_targets: true

_net: &net
  type: TorchArcNet
  actor_arc: *policy_body
  critic_arc: *value_body
  shared: false
  hid_layers_activation: relu
  init_fn: orthogonal_
  clip_grad_val: 1.0
  use_same_optim: false
  loss_spec:
    name: MSELoss
  optim_spec:
    name: Adam
    lr: 1.0e-3
    eps: 1.0e-5
  lr_scheduler_spec:
    name: LinearToMin
    frame: "${max_frame}"
    min_factor: 0.033
  gpu: auto

# --- DM Control: gamma=0.995, 16 epochs, 2048 envs ---

ppo_playground:
  agent:
    name: PPO
    algorithm:
      <<: *algorithm
      gamma: 0.995
      time_horizon: 30
      training_epoch: 16
      minibatch_size: 2048  # 2048 envs x 30 steps / 30 minibatches = 2048 (venv constraint: must be >= num_envs)
    memory: *memory
    net: *net
  env:
    <<: *env
    num_envs: 2048
  meta: *meta

# --- Locomotion/Manipulation: gamma=0.97, 4 epochs, 512 envs ---

ppo_playground_loco:
  agent:
    name: PPO
    algorithm:
      <<: *algorithm
      gamma: 0.97
      time_horizon: 64
      training_epoch: 4
    memory: *memory
    net: *net
  env:
    <<: *env
    num_envs: 2048
  meta: *meta
