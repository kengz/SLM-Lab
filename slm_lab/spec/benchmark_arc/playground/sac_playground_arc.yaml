# SAC Playground using TorchArcNet
# Single shared spec with ${env} and ${max_frame} substitution
# Usage: uv run slm-lab slm_lab/spec/benchmark_arc/playground/sac_playground_arc.yaml sac_playground_arc train -s env=playground/CheetahRun -s max_frame=1000000

# --- Shared anchors ---

_arc_body_256: &arc_body_256
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - ReLU:
        - LazyLinear: {out_features: 256}
        - ReLU:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_sac_net: &sac_net
  type: TorchArcNet
  arc: *arc_body_256
  hid_layers_activation: relu
  init_fn: orthogonal_
  clip_grad_val: null
  loss_spec:
    name: MSELoss
  optim_spec:
    name: Adam
    lr: 3.0e-4
  update_type: polyak
  update_frequency: 1
  polyak_coef: 0.005
  gpu: auto

_sac_algorithm: &sac_algorithm
  name: SoftActorCritic
  action_pdtype: default
  action_policy: default
  gamma: 0.99
  training_frequency: 1
  training_iter: 4
  training_start_step: 5000

_memory: &memory
  name: Replay
  batch_size: 256
  max_size: 1000000
  use_cer: false

_meta: &meta
  distributed: false
  log_frequency: 10000
  eval_frequency: 10000
  rigorous_eval: 0
  max_session: 4
  max_trial: 1

# --- Generic playground spec ---

sac_playground_arc:
  agent:
    name: SoftActorCritic
    algorithm: *sac_algorithm
    memory: *memory
    net: *sac_net
  env:
    name: "${env}"
    num_envs: 16
    max_t: null
    max_frame: "${max_frame}"
    normalize_obs: true
  meta: *meta
