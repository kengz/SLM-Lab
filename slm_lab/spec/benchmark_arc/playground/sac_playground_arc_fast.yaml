# SAC Playground FAST — higher num_envs to exploit MJX GPU parallelism
# num_envs=64, training_iter=4 (NOT scaled) → UTD=0.0625
# Training step time stays same (same 4 gradient updates), but sim collects 4x more transitions
# → ~4x fps speedup. Lower UTD trades per-transition learning for wall-clock speed.
#
# Usage: -s env=playground/CheetahRun -s max_frame=2000000

_arc_body_256: &arc_body_256
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - ReLU:
        - LazyLinear: {out_features: 256}
        - ReLU:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_sac_net: &sac_net
  type: TorchArcNet
  arc: *arc_body_256
  hid_layers_activation: relu
  init_fn: orthogonal_
  clip_grad_val: null
  loss_spec:
    name: MSELoss
  optim_spec:
    name: Adam
    lr: 3.0e-4
  update_type: polyak
  update_frequency: 1
  polyak_coef: 0.005
  gpu: auto

_sac_algorithm: &sac_algorithm
  name: SoftActorCritic
  action_pdtype: default
  action_policy: default
  gamma: 0.99
  training_frequency: 1
  training_iter: 4
  training_start_step: 5000

_memory: &memory
  name: Replay
  batch_size: 1024
  max_size: 1000000
  use_cer: false

_meta: &meta
  distributed: false
  log_frequency: 10000
  eval_frequency: 10000
  rigorous_eval: 0
  max_session: 4
  max_trial: 1

sac_playground_arc_fast:
  agent:
    name: SoftActorCritic
    algorithm: *sac_algorithm
    memory: *memory
    net: *sac_net
  env:
    name: "${env}"
    num_envs: 64
    max_t: null
    max_frame: "${max_frame}"
    normalize_obs: true
  meta: *meta
