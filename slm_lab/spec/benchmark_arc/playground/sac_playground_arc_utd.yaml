# SAC Playground with tunable UTD via ${training_iter}
# Usage examples:
#   UTD=0.25 (default): -s training_iter=4  -s env=playground/CheetahRun -s max_frame=2000000
#   UTD=0.5:            -s training_iter=8  -s env=playground/WalkerWalk  -s max_frame=2000000
#   UTD=1.0:            -s training_iter=16 -s env=playground/HopperHop   -s max_frame=1000000

_arc_body_256: &arc_body_256
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - ReLU:
        - LazyLinear: {out_features: 256}
        - ReLU:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_sac_net: &sac_net
  type: TorchArcNet
  arc: *arc_body_256
  hid_layers_activation: relu
  init_fn: orthogonal_
  clip_grad_val: null
  loss_spec:
    name: MSELoss
  optim_spec:
    name: Adam
    lr: 3.0e-4
  update_type: polyak
  update_frequency: 1
  polyak_coef: 0.005
  gpu: auto

_sac_algorithm: &sac_algorithm
  name: SoftActorCritic
  action_pdtype: default
  action_policy: default
  gamma: 0.99
  training_frequency: 1
  training_iter: "${training_iter}"
  training_start_step: 5000

_memory: &memory
  name: Replay
  batch_size: 256
  max_size: 1000000
  use_cer: false

_meta: &meta
  distributed: false
  log_frequency: 10000
  eval_frequency: 10000
  rigorous_eval: 0
  max_session: 4
  max_trial: 1

sac_playground_arc_utd:
  agent:
    name: SoftActorCritic
    algorithm: *sac_algorithm
    memory: *memory
    net: *sac_net
  env:
    name: "${env}"
    num_envs: 16
    max_t: null
    max_frame: "${max_frame}"
    normalize_obs: true
  meta: *meta
