# TC-03: Extinction
#
# Prerequisite: TC-01. Acquisition gate: approach_rate >= 0.60 in last 10
# acquisition trials — if not met, test aborts (acquisition_failed=True).
# Phase 2: 50 unrewarded CS presentations. Score = 1 - (ext_rate / acq_rate).
# Axiom trace: Ax14 (motor intentionality — learned responses are modifiable).
# Pass threshold: score >= 0.70; extinction rate < 0.30 * acquisition peak.
#
# Load: spec_util.get('embodied/pavlovian_tc03.yaml', 'ppo_pavlovian_tc03')

_policy_body: &policy_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 64}
        - Tanh:
        - LazyLinear: {out_features: 64}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_value_body: &value_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 1000
  eval_frequency: 2560
  max_session: 1
  max_trial: 1

ppo_pavlovian_tc03:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: Normal
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 500000
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 500000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 256
      minibatch_size: 64
      training_epoch: 10
    memory: *memory
    net:
      type: TorchArcNet
      actor_arc: *policy_body
      critic_arc: *value_body
      shared: false
      hid_layers_activation: tanh
      init_fn: orthogonal_
      clip_grad_val: 0.5
      use_same_optim: false
      loss_spec:
        name: MSELoss
      optim_spec:
        name: Adam
        lr: 3.0e-4
        eps: 1.0e-5
      gpu: auto
  env:
    name: SLM/Pavlovian-v0
    max_t: 1000
    max_frame: 600000
    num_envs: 8
    env_kwargs:
      task: extinction
      arena_size: 10.0
      dt: 0.0333
      max_energy: 100.0
      energy_decay: 0.1
      contact_radius: 0.6
      shaping_scale: 1.0
  meta: *meta
  curriculum:
    mastery_threshold: 0.80
    mastery_window: 20
    min_eval_trials: 50
    max_eval_trials: 100
  phase:
    acquisition_trials: 40
    acquisition_gate_window: 10   # last N trials to check for gate
    acquisition_gate_min: 0.60    # abort if below this
    extinction_trials: 50
    cs_duration: 30
    iti_duration: 60
    reward_on_contact: 10.0
    blue_penalty: -5.0
    shaping_active: true          # acquisition only; off during extinction
  eval:
    score_fn: score_tc03
    pass_threshold: 0.70          # extinction score
    ci_lower_min: 0.50
    extinction_rate_max_fraction: 0.30   # ext_rate < 0.30 * acq_rate
