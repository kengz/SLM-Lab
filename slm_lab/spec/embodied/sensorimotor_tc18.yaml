# TC-18: Tool Use (Pull Cloth)
#
# Agent grasps cloth edge to retrieve out-of-reach object placed on cloth.
# Phase 1: training (50 episodes, 500 steps) with shaped reward.
# Phase 2: evaluation standard (20 episodes, 500 steps) — no reward.
# Phase 3: transfer evaluation (10 episodes) — novel cloth/object configurations.
# Axiom trace: Ax8 (affordances — cloth affords pulling, object-on-cloth affords retrieval).
# Pass threshold: standard_rate >= 0.60; transfer_rate >= 0.50; score >= 0.56.
#
# Load: spec_util.get('embodied/sensorimotor_tc18.yaml', 'ppo_sensorimotor_tc18')

ppo_sensorimotor_tc18:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: default
      action_policy: default
      explore_var_spec: null
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 1000000
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 1000000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 512
      minibatch_size: 64
      training_epoch: 10
    memory:
      name: OnPolicyBatchReplay
    net:
      type: MLPNet
      shared: false
      hid_layers:
        - 512
        - 512
      hid_layers_activation: tanh
      clip_grad_val: 1.0
      use_same_optim: false
      loss_spec:
        name: MSELoss
      actor_optim_spec:
        name: AdamW
        lr: 0.0003
        betas:
          - 0.9
          - 0.999
        weight_decay: 0.01
      critic_optim_spec:
        name: AdamW
        lr: 0.0003
        betas:
          - 0.9
          - 0.999
        weight_decay: 0.01
      gpu: auto
  env:
    name: SLM/Sensorimotor-v0
    max_t: 500                       # 500 steps per episode (20 s)
    max_frame: 1000000
    num_envs: 16
    env_kwargs:
      task: tool_use_cloth
      dt: 0.002
      control_freq: 25
      arena_size: 5.0
      table_height: 0.75
      max_energy: 100.0
      energy_decay: 0.05
      intrinsic_eta: 0.01
      n_objects: 2                   # cloth + cube_blue (target)
      use_ground_truth_obs: true
      # TC-18 specific
      training_episodes: 50
      eval_episodes: 20
      transfer_episodes: 10
      # Reward shaping (training only)
      grasp_target_reward: 10.0
      cloth_grasp_reward: 3.0        # for grasping cloth edge
      cloth_pull_reward_per_5cm: 1.0 # per 0.05 m pulled toward agent
      # Cloth parameters
      cloth_size: 0.30               # m, 0.30 x 0.30 m
      cloth_grid: 6                  # 6x6 composite body
      cloth_spacing: 0.05            # m between particles
      cloth_object_friction: 0.8     # high friction to prevent sliding
      # Transfer conditions
      transfer_configs:
        - object: sphere_red         # novel object
        - cloth_rotation: 90         # degrees
        - object_position: corner    # corner vs center of cloth
  meta:
    distributed: false
    log_frequency: 1000
    eval_frequency: 8192
    max_session: 1
    max_trial: 1
  curriculum:
    mastery_threshold: 0.95
    mastery_window: 20
    min_eval_trials: 20
    max_eval_trials: 50
  intrinsic:
    eta: 0.01
    active_during_training: true
    active_during_eval: false
  eval:
    score_fn: score_tc18
    pass_threshold: 0.56             # 0.6*standard + 0.4*transfer
    ci_lower_min: 0.35               # 0.70 * 0.56 (rounded)
    standard_rate_min: 0.60
    transfer_rate_min: 0.50
