# TC-14: Object Interaction
#
# Agent discovers object affordances (push, grasp+lift, shake) through free interaction.
# Phase 1: free interaction with intrinsic reward (40 episodes, 300 steps).
# Phase 2: evaluation — interaction rate with/without object; action entropy (20 episodes).
# Axiom trace: Ax8 (affordances), Ax14 (motor intentionality).
# Pass threshold: interaction_rate_present >= 2x absent; entropy > 0.5 * max; score >= 0.50.
#
# Load: spec_util.get('embodied/sensorimotor_tc14.yaml', 'ppo_sensorimotor_tc14')

ppo_sensorimotor_tc14:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: default
      action_policy: default
      explore_var_spec: null
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 1000000
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 1000000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 512
      minibatch_size: 64
      training_epoch: 10
    memory:
      name: OnPolicyBatchReplay
    net:
      type: MLPNet
      shared: false
      hid_layers:
        - 512
        - 512
      hid_layers_activation: tanh
      clip_grad_val: 1.0
      use_same_optim: false
      loss_spec:
        name: MSELoss
      actor_optim_spec:
        name: AdamW
        lr: 0.0003
        betas:
          - 0.9
          - 0.999
        weight_decay: 0.01
      critic_optim_spec:
        name: AdamW
        lr: 0.0003
        betas:
          - 0.9
          - 0.999
        weight_decay: 0.01
      gpu: auto
  env:
    name: SLM/Sensorimotor-v0
    max_t: 300                       # 300 steps per episode (12 s)
    max_frame: 1000000
    num_envs: 16
    env_kwargs:
      task: object_interaction
      dt: 0.002
      control_freq: 25
      arena_size: 5.0
      table_height: 0.75
      max_energy: 100.0
      energy_decay: 0.05
      intrinsic_eta: 0.01
      n_objects: 1                   # cube_red (0.05 m, 0.10 kg)
      use_ground_truth_obs: true
      # TC-14 specific
      interaction_episodes: 40       # Phase 1: free interaction
      eval_episodes: 20              # Phase 2: measure interaction rate + entropy
      interaction_modes:             # post-hoc classification thresholds
        push_lateral_min: 0.03       # m — lateral displacement to count as push
        lift_z_min: 0.80             # m above floor = table height + 0.05 m clearance
        rotate_angle_min: 0.3        # rad — orientation change for rotate
        drop_z_peak_min: 0.85        # m — peak height before drop
      # control condition interleaved (absent-object trials)
      control_interleaved: true
  meta:
    distributed: false
    log_frequency: 1000
    eval_frequency: 8192
    max_session: 1
    max_trial: 1
  curriculum:
    mastery_threshold: 0.95
    mastery_window: 20
    min_eval_trials: 20
    max_eval_trials: 50
  intrinsic:
    eta: 0.01
    active_during_training: true
    active_during_eval: false
  eval:
    score_fn: score_tc14
    pass_threshold: 0.50             # 0.5*preference + 0.5*variety
    ci_lower_min: 0.30               # 0.70 * 0.50 (rounded to 2 dp)
    interaction_rate_multiplier: 2.0 # present must be >= 2x absent
    entropy_fraction_min: 0.50       # > 0.5 * max_entropy
