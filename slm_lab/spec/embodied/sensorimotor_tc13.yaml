# TC-13: Motor Coordination (Reaching)
#
# Agent learns to reach random targets in the 3D workspace.
# Phase 1: shaped training (dense distance reward + contact bonus).
# Phase 2: evaluation (no reward), 20 episodes.
# Axiom trace: Ax14 (motor intentionality).
# Pass threshold: success_rate >= 0.60; score >= 0.50.
#
# Load: spec_util.get('embodied/sensorimotor_tc13.yaml', 'ppo_sensorimotor_tc13')

_policy_body: &policy_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_value_body: &value_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 1000
  eval_frequency: 8192
  max_session: 1
  max_trial: 1

ppo_sensorimotor_tc13:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: Normal
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 2000000
      entropy_coef_spec:
        name: linear_decay
        start_val: 0.05
        end_val: 0.005
        start_step: 0
        end_step: 5000000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 200
      minibatch_size: 128
      training_epoch: 10
    memory: *memory
    net:
      type: TorchArcNet
      actor_arc: *policy_body
      critic_arc: *value_body
      shared: false
      hid_layers_activation: tanh
      init_fn: orthogonal_
      clip_grad_val: 0.5
      use_same_optim: false
      loss_spec:
        name: MSELoss
      optim_spec:
        name: Adam
        lr: 3.0e-4
        eps: 1.0e-5
      gpu: auto
  env:
    name: SLM-Sensorimotor-TC13-v0
    max_t: 200
    max_frame: 5000000
    num_envs: 16
    normalize_obs: false
  meta: *meta
  curriculum:
    mastery_threshold: 0.95
    mastery_window: 20
    min_eval_trials: 20
    max_eval_trials: 50
  intrinsic:
    eta: 0.01
    active_during_training: true
    active_during_eval: false
  eval:
    score_fn: score_tc13
    pass_threshold: 0.50             # composite: 0.7*success + 0.3*efficiency
    ci_lower_min: 0.35               # 0.70 * 0.50
    success_rate_min: 0.60
