# TC-12: Action-Effect Discovery
#
# Agent discovers self-as-causal-agent via proprioceptive-visual correspondence.
# 3-phase: baseline (no contingency) → contingency active → extinction.
# Intrinsic reward: prediction error on proprioceptive-visual correspondence.
# Axiom trace: Ax14 (motor intentionality), Ax15 (maximum grip).
# Pass threshold: contingency movement >= 2x baseline; repetition_rate >= 0.30; score >= 0.60.
#
# Load: spec_util.get('embodied/sensorimotor_tc12.yaml', 'ppo_sensorimotor_tc12')

_policy_body: &policy_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_value_body: &value_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 1000
  eval_frequency: 8192
  max_session: 1
  max_trial: 1

ppo_sensorimotor_tc12:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: Normal
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 1000000
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 1000000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 512
      minibatch_size: 64
      training_epoch: 10
    memory: *memory
    net:
      type: TorchArcNet
      actor_arc: *policy_body
      critic_arc: *value_body
      shared: false
      hid_layers_activation: tanh
      init_fn: orthogonal_
      clip_grad_val: 1.0
      use_same_optim: false
      loss_spec:
        name: MSELoss
      optim_spec:
        name: Adam
        lr: 3.0e-4
        eps: 1.0e-5
      gpu: auto
  env:
    name: SLM/Sensorimotor-v0
    max_t: 200                       # 200 steps per episode (8 s)
    max_frame: 1000000
    num_envs: 16
    env_kwargs:
      task: action_effect_discovery
      dt: 0.002
      control_freq: 25
      arena_size: 5.0
      table_height: 0.75
      max_energy: 100.0
      energy_decay: 0.05
      intrinsic_eta: 0.01
      n_objects: 0                   # empty table — agent explores own body
      use_ground_truth_obs: true
      # TC-12 specific
      baseline_episodes: 20          # Phase 1: no contingency
      contingency_episodes: 40       # Phase 2: intrinsic reward active
      extinction_episodes: 10        # Phase 3: no intrinsic reward
      high_effect_ee_threshold: 0.05 # m/step — displacement qualifying as high-effect
      repetition_joint_tolerance: 0.1 # rad — threshold for "repeating" a joint config
  meta: *meta
  curriculum:
    mastery_threshold: 0.95
    mastery_window: 20
    min_eval_trials: 20
    max_eval_trials: 50
  intrinsic:
    eta: 0.01
    active_during_training: true
    active_during_eval: false
  eval:
    score_fn: score_tc12
    pass_threshold: 0.60
    ci_lower_min: 0.42               # 0.70 * 0.60
    contingency_movement_multiplier: 2.0  # must be >= 2x baseline
    repetition_rate_min: 0.30
