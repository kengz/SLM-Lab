# DaseinNet + PPO on SLM-Sensorimotor-TC11-v0
#
# Full L0+L1 pipeline (ProprioceptionEncoder + ObjectStateEncoder + BeingEmbedding)
# integrated with PPO actor-critic via DaseinNet shared network.
#
# TC-11 is the simplest sensorimotor task (reflex validation — 3 pre-wired reflexes).
# This spec validates the DaseinNet forward/backward pass in a real training loop.
#
# Axiom trace: Ax2 (transparent coping), Ax14 (motor intentionality).
# Load: spec_util.get('embodied/dasein_sensorimotor.yaml', 'dasein_ppo_sensorimotor_tc11')

dasein_ppo_sensorimotor_tc11:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: default
      action_policy: default
      explore_var_spec: null
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 0
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 0
      val_loss_coef: 0.5
      time_horizon: 128
      minibatch_size: 64
      training_epoch: 4
      normalize_v_targets: true
    memory:
      name: OnPolicyBatchReplay
    net:
      type: DaseinNet
      shared: true
      action_dim: 10              # 7 joint targets + gripper + head pan/tilt
      log_std_init: 0.0           # state-independent log_std
      clip_grad_val: 0.5
      use_same_optim: true
      loss_spec:
        name: MSELoss
      optim_spec:
        name: Adam
        lr: 3.0e-4
      lr_scheduler_spec: null
      gpu: false

  env:
    name: SLM-Sensorimotor-TC11-v0
    num_envs: 1
    max_t: 500
    max_frame: 500000
    normalize_obs: false
    normalize_reward: false

  meta:
    distributed: false
    log_frequency: 2000
    eval_frequency: 10000
    rigorous_eval: 0
    max_session: 1
    max_trial: 1
    resume: false
