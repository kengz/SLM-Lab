# TC-02: Temporal Contingency Learning
#
# Phase 1: acquisition at 1.0 s delay (30 steps) with shaping.
# Phase 2: multi-delay probe [0.5s, 1.0s, 2.0s], no reward.
# Axiom trace: Ax3 (temporality), Ax14 (motor intentionality).
# Pass threshold: timing_accuracy >= 0.50; temporal_specificity_ratio > 2.0.
#
# Load: spec_util.get('embodied/pavlovian_tc02.yaml', 'ppo_pavlovian_tc02')

_policy_body: &policy_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 64}
        - Tanh:
        - LazyLinear: {out_features: 64}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_value_body: &value_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 1000
  eval_frequency: 2560
  max_session: 1
  max_trial: 1

ppo_pavlovian_tc02:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: Normal
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 500000
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 500000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 256
      minibatch_size: 64
      training_epoch: 10
    memory: *memory
    net:
      type: TorchArcNet
      actor_arc: *policy_body
      critic_arc: *value_body
      shared: false
      hid_layers_activation: tanh
      init_fn: orthogonal_
      clip_grad_val: 0.5
      use_same_optim: false
      loss_spec:
        name: MSELoss
      optim_spec:
        name: Adam
        lr: 3.0e-4
        eps: 1.0e-5
      gpu: auto
  env:
    name: SLM/Pavlovian-v0
    max_t: 1200
    max_frame: 600000
    num_envs: 8
    env_kwargs:
      task: temporal_contingency
      arena_size: 10.0
      dt: 0.0333
      max_energy: 100.0
      energy_decay: 0.1
      contact_radius: 0.6
      shaping_scale: 1.0
  meta: *meta
  curriculum:
    mastery_threshold: 0.80
    mastery_window: 20
    min_eval_trials: 60        # 20 per delay * 3 delays
    max_eval_trials: 120
  phase:
    acquisition_trials: 40
    probe_trials: 60           # 20 per delay
    trained_delay_steps: 30    # 1.0 s
    iti_duration: 90           # 3.0 s
    us_window_fraction: 0.20   # +/-20% of delay
    timing_bonus: 1.0
    reward_on_contact: 10.0
    shaping_active: true
    probe_delays_steps:        # [0.5s, 1.0s, 2.0s]
      - 15
      - 30
      - 60
  eval:
    score_fn: score_tc02
    pass_threshold: 0.50       # timing_accuracy
    ci_lower_min: 0.30
    temporal_specificity_min: 2.0
