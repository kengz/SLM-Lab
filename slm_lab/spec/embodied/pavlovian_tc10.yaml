# TC-10: Chaining
#
# Prerequisite: TC-09. Multi-step spatial navigation chain: green → blue → red.
# Intermediate reward: +2.0 per correct step. Chain bonus: +20.0 on completion.
# Wrong object during chain: -1.0 penalty + chain reset.
# Axiom trace: Ax3 (temporality — temporal plan across sub-goals), Ax14 (motor intentionality).
# Pass threshold: completion_rate >= 0.70; >= 5 chains attempted per episode.
#
# Known limitation: spatial navigation chain (green→blue→red) approximates action-sequence
# chain (pull→press→food). Re-implement in MuJoCo Phase 3.2 where distinct action types
# are available.
#
# Load: spec_util.get('embodied/pavlovian_tc10.yaml', 'ppo_pavlovian_tc10')

ppo_pavlovian_tc10:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: default
      action_policy: default
      explore_var_spec: null
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 500000
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 500000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 256
      minibatch_size: 64
      training_epoch: 10
    memory:
      name: OnPolicyBatchReplay
    net:
      type: MLPNet
      shared: false
      hid_layers:
        - 256
        - 256
      hid_layers_activation: tanh
      clip_grad_val: 0.5
      use_same_optim: false
      loss_spec:
        name: MSELoss
      actor_optim_spec:
        name: Adam
        lr: 0.0003
      critic_optim_spec:
        name: Adam
        lr: 0.001
      gpu: auto
  env:
    name: SLM/Pavlovian-v0
    max_t: 1000
    max_frame: 500000
    num_envs: 8
    env_kwargs:
      task: chaining
      arena_size: 10.0
      dt: 0.0333
      max_energy: 100.0
      energy_decay: 0.1
      contact_radius: 0.6
  meta:
    distributed: false
    log_frequency: 1000
    eval_frequency: 2560
    max_session: 1
    max_trial: 1
  curriculum:
    mastery_threshold: 0.80
    mastery_window: 20
    min_eval_trials: 20
    max_eval_trials: 40
  phase:
    eval_episodes: 20
    episode_length: 1000
  eval:
    score_fn: score_tc10
    pass_threshold: 0.70       # completion_rate = chains_completed / chains_attempted
    ci_lower_min: 0.50
    min_chains_per_episode: 5  # active engagement check
    known_limitation: "Spatial chain (green→blue→red) approximates action-sequence chain; re-test in Phase 3.2 MuJoCo"
