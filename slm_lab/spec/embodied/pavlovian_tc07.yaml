# TC-07: Reward Contingency Learning (Operant)
#
# Prerequisite: TC-01. Single-phase continuous operant conditioning.
# No CS signal. Reward proportional to forward velocity: max(0, action[0]) * 0.5.
# Axiom trace: Ax4 (care — agent discovers actions have consequences).
# Pass threshold: forward_rate >= 5x random baseline (>= ~1.25 absolute).
#
# Load: spec_util.get('embodied/pavlovian_tc07.yaml', 'ppo_pavlovian_tc07')

_policy_body: &policy_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 64}
        - Tanh:
        - LazyLinear: {out_features: 64}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_value_body: &value_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 1000
  eval_frequency: 2560
  max_session: 1
  max_trial: 1

ppo_pavlovian_tc07:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: Normal
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 300000
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 300000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 256
      minibatch_size: 64
      training_epoch: 10
    memory: *memory
    net:
      type: TorchArcNet
      actor_arc: *policy_body
      critic_arc: *value_body
      shared: false
      hid_layers_activation: tanh
      init_fn: orthogonal_
      clip_grad_val: 0.5
      use_same_optim: false
      loss_spec:
        name: MSELoss
      optim_spec:
        name: Adam
        lr: 3.0e-4
        eps: 1.0e-5
      gpu: auto
  env:
    name: SLM/Pavlovian-v0
    max_t: 1000
    max_frame: 300000
    num_envs: 8
    env_kwargs:
      task: reward_contingency
      arena_size: 10.0
      dt: 0.0333
      max_energy: 100.0
      energy_decay: 0.1
      contact_radius: 0.6
  meta: *meta
  curriculum:
    mastery_threshold: 0.80
    mastery_window: 20
    min_eval_trials: 10
    max_eval_trials: 20
  phase:
    eval_episodes: 10
    episode_length: 1000
  eval:
    score_fn: score_tc07
    # Expected random baseline: E[max(0, U(-1,1))] = 0.25
    # Threshold: forward_rate >= 5x * 0.25 = 1.25
    random_baseline: 0.25
    baseline_multiplier: 5.0
    pass_threshold: 1.00       # score = forward_rate / (5 * random_baseline)
    measure_baseline: true     # run 50 random-policy trials before eval
