# PPO spec for PavlovianMjxEnv (MuJoCo Playground native, JAX/MJWarp).
#
# TC-07: Reward Contingency Learning (Operant) — smoke test spec.
# Prerequisite: pavlovian_mjx.py, pavlovian_mjx_tasks.py registered in env/__init__.py.
#
# Architecture: asymmetric 2x64 policy + 3x256 value (DM Control defaults).
# 64 envs, 256-step horizon, 10 epochs — matches SLM Pavlovian training settings.
#
# Usage:
#   slm-lab slm_lab/spec/embodied/pavlovian_mjx.yaml ppo_pavlovian_mjx_tc07 train

_policy_body: &policy_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 64}
        - Tanh:
        - LazyLinear: {out_features: 64}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_value_body: &value_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 1000
  eval_frequency: 2560
  max_session: 1
  max_trial: 1

ppo_pavlovian_mjx_tc07:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: Normal
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
      val_loss_coef: 0.5
      normalize_v_targets: false
      time_horizon: 256
      minibatch_size: 64
      training_epoch: 10
    memory: *memory
    net:
      type: TorchArcNet
      actor_arc: *policy_body
      critic_arc: *value_body
      shared: false
      hid_layers_activation: tanh
      init_fn: orthogonal_
      clip_grad_val: 0.5
      use_same_optim: false
      loss_spec:
        name: MSELoss
      optim_spec:
        name: Adam
        lr: 3.0e-4
        eps: 1.0e-5
      gpu: auto
  env:
    name: playground/SLM-Pavlovian-TC07-v0
    max_t: 1000
    max_frame: 300000
    num_envs: 64
    normalize_obs: true
    reward_scale: 1.0
  meta: *meta
