# TC-21: Support Relations
#
# Agent predicts where objects fall when support is removed (anticipatory positioning),
# and catches/prevents objects from falling off a tilted surface.
# Phase 1: observation (10 episodes) — demonstrations only, agent does not act.
# Phase 2: prediction evaluation (20 trials) — agent positions ee at predicted fall location.
# Phase 3: active support evaluation (10 trials) — agent prevents object from falling.
# Axiom trace: Ax9 (direct perception — support relations perceived directly from physics).
# Pass threshold: prediction_rate >= 0.60; catch_rate >= 0.40; score >= 0.50.
#
# Load: spec_util.get('embodied/sensorimotor_tc21.yaml', 'ppo_sensorimotor_tc21')

_policy_body: &policy_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_value_body: &value_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 1000
  eval_frequency: 8192
  max_session: 1
  max_trial: 1

ppo_sensorimotor_tc21:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: Normal
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 1000000
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 1000000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 512
      minibatch_size: 64
      training_epoch: 10
    memory: *memory
    net:
      type: TorchArcNet
      actor_arc: *policy_body
      critic_arc: *value_body
      shared: false
      hid_layers_activation: tanh
      init_fn: orthogonal_
      clip_grad_val: 1.0
      use_same_optim: false
      loss_spec:
        name: MSELoss
      optim_spec:
        name: Adam
        lr: 3.0e-4
        eps: 1.0e-5
      gpu: auto
  env:
    name: SLM/Sensorimotor-v0
    max_t: 200                       # 200 steps per episode (8 s)
    max_frame: 1000000
    num_envs: 16
    env_kwargs:
      task: support_relations
      dt: 0.002
      control_freq: 25
      arena_size: 5.0
      table_height: 0.75
      max_energy: 100.0
      energy_decay: 0.05
      intrinsic_eta: 0.01
      n_objects: 2                   # platform + cube_green (target on platform)
      use_ground_truth_obs: true
      # TC-21 specific
      observation_episodes: 10       # Phase 1: agent locked, observes
      prediction_trials: 20          # Phase 2: anticipatory positioning
      catch_trials: 10               # Phase 3: prevent fall
      # Platform geometry
      platform_size:
        - 0.10
        - 0.10
        - 0.05                       # m
      # Scoring thresholds
      prediction_radius: 0.05        # m — ee must be within this of fall location
  meta: *meta
  curriculum:
    mastery_threshold: 0.95
    mastery_window: 20
    min_eval_trials: 20
    max_eval_trials: 50
  intrinsic:
    eta: 0.01
    active_during_training: true
    active_during_eval: false
  eval:
    score_fn: score_tc21
    pass_threshold: 0.50             # 0.6*prediction + 0.4*catch
    ci_lower_min: 0.35               # 0.70 * 0.50
    prediction_rate_min: 0.60
    catch_rate_min: 0.40
