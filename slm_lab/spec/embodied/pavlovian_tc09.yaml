# TC-09: Shaping
#
# Prerequisite: TC-07. Compares two conditions:
#   Condition A (shaped): distance shaping + milestone bonuses + contact reward.
#   Condition B (unshaped): contact reward only, no shaping.
# Axiom trace: Ax17 (skill acquisition — shaping implements novice-to-competent transition).
# Pass threshold: shaped_success_rate >= 0.80; shaped > unshaped; combined score >= 0.60.
#
# Note: 3-step lever press deferred to MuJoCo sensorimotor env (Phase 3.2).
# 2D navigation reaching is the available proxy for this environment.
#
# Load: spec_util.get('embodied/pavlovian_tc09.yaml', 'ppo_pavlovian_tc09')

ppo_pavlovian_tc09:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: default
      action_policy: default
      explore_var_spec: null
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 500000
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 500000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 256
      minibatch_size: 64
      training_epoch: 10
    memory:
      name: OnPolicyBatchReplay
    net:
      type: MLPNet
      shared: false
      hid_layers:
        - 256
        - 256
      hid_layers_activation: tanh
      clip_grad_val: 0.5
      use_same_optim: false
      loss_spec:
        name: MSELoss
      actor_optim_spec:
        name: Adam
        lr: 0.0003
      critic_optim_spec:
        name: Adam
        lr: 0.001
      gpu: auto
  env:
    name: SLM/Pavlovian-v0
    max_t: 1000
    max_frame: 500000
    num_envs: 8
    env_kwargs:
      task: shaping
      arena_size: 10.0
      dt: 0.0333
      max_energy: 100.0
      energy_decay: 0.1
      contact_radius: 0.6
  meta:
    distributed: false
    log_frequency: 1000
    eval_frequency: 2560
    max_session: 1
    max_trial: 1
  curriculum:
    mastery_threshold: 0.80
    mastery_window: 20
    min_eval_trials: 10
    max_eval_trials: 20
  phase:
    training_episodes: 50
    eval_episodes: 10
    episode_length: 1000
    run_unshaped_condition: true   # Condition B comparison
  eval:
    score_fn: score_tc09
    shaped_success_min: 0.80   # shaped reach rate
    pass_threshold: 0.60       # combined score
    # combined = 0.5*reach_score + 0.3*advantage_score + 0.2*efficiency_score
    # Deferred: 3-step lever press → Phase 3.2 MuJoCo sensorimotor env
    known_limitation: "3-step lever press deferred to Phase 3.2 MuJoCo env"
