# Base Pavlovian config — shared defaults for TC-01 through TC-10.
#
# Task-specific overrides live in pavlovian_tc_XX.yaml (one file per task).
# Load via: spec_util.get('embodied/base_pavlovian.yaml', 'ppo_pavlovian_base')
#
# Agent: PPO with asymmetric 2x64 policy + 3x256 value (TorchArcNet).
# Env:   SLM/Pavlovian-v0 — 10x10 2D kinematic arena, 18-dim obs, 2-DOF action.
#        Env registered in slm_lab/env/__init__.py; task variant set via env kwargs.
#
# Hydra config design (§4, env-platform-strategy.md):
#   - This file is the single source of truth for defaults.
#   - Per-task YAML files import this via _defaults_ list (Hydra) or are
#     loaded by spec_util.get() directly (SLM-Lab compat mode).
#   - mastery_threshold / mastery_window: read by curriculum.py for gate logic.
#   - acquisition_trials / probe_trials: read by pavlovian.py phase manager.

_policy_body: &policy_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 64}
        - Tanh:
        - LazyLinear: {out_features: 64}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_value_body: &value_body
  modules:
    body:
      Sequential:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
        - LazyLinear: {out_features: 256}
        - Tanh:
  graph:
    input: x
    modules:
      body: [x]
    output: body

_memory: &memory
  name: OnPolicyBatchReplay

_meta: &meta
  distributed: false
  log_frequency: 1000
  eval_frequency: 2560
  max_session: 1
  max_trial: 1

ppo_pavlovian_base:
  agent:
    name: PPO
    algorithm:
      name: PPO
      action_pdtype: Normal
      gamma: 0.99
      lam: 0.95
      clip_eps_spec:
        name: no_decay
        start_val: 0.2
        end_val: 0.2
        start_step: 0
        end_step: 500000
      entropy_coef_spec:
        name: no_decay
        start_val: 0.01
        end_val: 0.01
        start_step: 0
        end_step: 500000
      val_loss_coef: 0.5
      clip_val_loss: false
      time_horizon: 256
      minibatch_size: 64
      training_epoch: 10
    memory: *memory
    net:
      type: TorchArcNet
      actor_arc: *policy_body
      critic_arc: *value_body
      shared: false
      hid_layers_activation: tanh
      init_fn: orthogonal_
      clip_grad_val: 0.5
      use_same_optim: false
      loss_spec:
        name: MSELoss
      optim_spec:
        name: Adam
        lr: 3.0e-4
        eps: 1.0e-5
      gpu: auto
  env:
    # Registered Gymnasium env. Task variant is set per-file via env_kwargs.
    name: SLM/Pavlovian-v0
    max_t: 1000
    max_frame: 500000
    num_envs: 8
    # Pavlovian env parameters (passed as kwargs to env constructor)
    env_kwargs:
      task: null               # Override per task (e.g. "stimulus_response")
      arena_size: 10.0
      dt: 0.0333               # 30 Hz timestep
      max_energy: 100.0
      energy_decay: 0.1
      contact_radius: 0.6
      shaping_scale: 1.0       # distance-based shaping scale (acquisition only)
  meta: *meta
  # Curriculum / mastery parameters (read by curriculum.py)
  curriculum:
    mastery_threshold: 0.80
    mastery_window: 20         # episodes in sliding window
    min_eval_trials: 50        # minimum probe trials before scoring
    max_eval_trials: 100
  # Phase parameters (read by pavlovian.py phase manager)
  phase:
    acquisition_trials: 40
    probe_trials: 50
    cs_duration: 30            # steps (1.0 s at 30 Hz)
    iti_duration: 60           # steps (2.0 s at 30 Hz)
