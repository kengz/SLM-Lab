type: task
name: slm-lab

python: 3.12

repos:
  - "..:/workflow"

env:
  - HF_TOKEN
  - HF_REPO
  - SPEC_FILE
  - SPEC_NAME
  - LAB_MODE
  - SPEC_VARS  # --set overrides, e.g. "-s env=ALE/Breakout-v5"
  - PROFILE
  - PROF_SKIP
  - PROF_ACTIVE
  - PLAYGROUND
  - XLA_PYTHON_CLIENT_PREALLOCATE=false
  - MJX_GPU_DEFAULT_WARP=true
  - CUDA_VISIBLE_DEVICES=0

commands:
  - apt-get update && apt-get install -y swig libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1
  - cd /workflow && uv sync
  - if [ -n "$PLAYGROUND" ]; then cd /workflow && uv sync --group playground; fi
  # Install CUDA-enabled JAX for MJWarp GPU acceleration. Note: JAX PJRT CUDA
  # plugin may not initialize on all RunPod container configs — falls back to
  # CPU JAX/MJX transparently (~600-800fps). GPU path gives ~3-5x speedup.
  - if [ -n "$PLAYGROUND" ]; then cd /workflow && uv pip install "jax[cuda12]==0.5.3"; fi
  - if [ -n "$PLAYGROUND" ]; then cd /workflow && uv run python -c "from mujoco_playground._src.mjx_env import ensure_menagerie_exists; ensure_menagerie_exists()"; fi
  - cd /workflow && uv run slm-lab run ${SPEC_VARS} ${SPEC_FILE} ${SPEC_NAME} ${LAB_MODE} --upload-hf

resources:
  gpu:
    memory: 20GB..
    count: 1
  memory: 32GB..

spot_policy: auto
max_duration: 6h
max_price: 0.50
retry:
  on_events: [no-capacity]
  duration: 1h
