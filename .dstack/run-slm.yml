type: task
name: slm-train

python: 3.12

repos:
  - "..:/workflow"

env:
  - SCRIPT
  - TOTAL_FRAMES
  - UV_HTTP_TIMEOUT=300

commands:
  - apt-get update && apt-get install -y swig libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1
  - cd /workflow && uv sync
  - cd /workflow && uv run python ${SCRIPT}

resources:
  gpu:
    name: L4
    count: 1
  memory: 32GB..

spot_policy: auto
max_duration: 6h
max_price: 0.50
retry:
  on_events: [no-capacity]
  duration: 1h
